#  ⚠  Modifiez les valeurs ci-dessous avant de lancer le backend
# ═══════════════════════════════════════════════════════════════

# ── Serveur ────────────────────────────────────────────────────
server.port=8080

# ── Base de données PostgreSQL ─────────────────────────────────
spring.datasource.url=jdbc:postgresql://localhost:5432/studentspace
spring.datasource.username=postgres
spring.datasource.password=postgres
spring.datasource.driver-class-name=org.postgresql.Driver

# ── JPA / Hibernate ────────────────────────────────────────────
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# ── JWT ────────────────────────────────────────────────────────
# Clé secrète (minimum 256 bits = 32 caractères) — changez en production !
jwt.secret=StudentSpaceSecretKey2025PFEAbdessamadKhalid!!
jwt.expiration=86400000

# ── CORS ───────────────────────────────────────────────────────
# Ajoutez l'URL de votre frontend déployé (ex: Vercel, Netlify)
cors.allowed-origins=http://localhost:4200

# ── Logs ───────────────────────────────────────────────────────
logging.level.com.studentspace=INFO
logging.level.org.springframework.security=WARN
