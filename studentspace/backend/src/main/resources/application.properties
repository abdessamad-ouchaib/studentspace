# ═══════════════════════════════════════════════════════════════
#  StudentSpace — application.properties
#  Les valeurs sont lues depuis les variables d'environnement
#  (définies sur Render) avec ${VAR:valeur_par_defaut}
# ═══════════════════════════════════════════════════════════════

# ── Serveur ────────────────────────────────────────────────────
server.port=${PORT:8080}

# ── Base de données PostgreSQL (Supabase) ──────────────────────
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/studentspace}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:postgres}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:postgres}
spring.datasource.driver-class-name=org.postgresql.Driver

# ── Connection pool (important pour Supabase pooler) ──────────
spring.datasource.hikari.connection-timeout=20000
spring.datasource.hikari.maximum-pool-size=5

# ── JPA / Hibernate ────────────────────────────────────────────
spring.jpa.hibernate.ddl-auto=${SPRING_JPA_HIBERNATE_DDL_AUTO:validate}
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# ── JWT ────────────────────────────────────────────────────────
jwt.secret=${JWT_SECRET:StudentSpaceSecretKey2025PFEAbdessamadKhalid!!}
jwt.expiration=86400000

# ── CORS ───────────────────────────────────────────────────────
cors.allowed-origins=${CORS_ALLOWED_ORIGINS:http://localhost:4200}

# ── Logs ───────────────────────────────────────────────────────
logging.level.com.studentspace=INFO
logging.level.org.springframework.security=WARN
